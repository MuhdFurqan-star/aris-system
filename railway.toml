[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python manage.py migrate --no-input && python manage.py load_initial_data && python manage.py collectstatic --no-input && gunicorn replacement_system.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --no-sendfile"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
